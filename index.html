// ─── T() — Translation helper ─────────────────────────
const T = k => (LANGS[S.lang]?.t[k] || LANGS.en.t[k] || k);

// ─── UTILS ────────────────────────────────────────────
function $(sel){ return document.querySelector(sel); }
function $$(sel){ return document.querySelectorAll(sel); }
function el(tag,cls,html='',attrs={}){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html) e.innerHTML=html;
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}

// Toast
function toast(msg,type='s',dur=3200){
  const t=el('div',`tst t${type}`,`<span>${{s:'✓',e:'✕',w:'⚠',i:'ℹ'}[type]||'✓'}</span> ${msg}`);
  const c=$('#tc'); c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-5px)';setTimeout(()=>t.remove(),300)},dur);
}

// Format dollar
function fmt$(v){ return '$'+(parseFloat(v)||0).toFixed(2); }
// Format date
function fmtD(ts){ return ts?new Date(ts).toLocaleDateString():'—'; }
// Time ago
function timeAgo(ts){
  const s=(Date.now()-ts)/1000;
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
// Safe encode for Firebase keys
function encKey(k){ return k.replace(/[.#$[\]/]/g,'_'); }
// Generate ref code
function genRef(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
// Device fingerprint (basic)
function getDeviceId(){
  let id=localStorage.getItem('ez_dev');
  if(!id){
    id=[navigator.platform,screen.width,screen.height,navigator.language,new Date().getTimezoneOffset()].join('-');
    id=btoa(id).replace(/=/g,'').slice(0,20);
    localStorage.setItem('ez_dev',id);
  }
  return id;
}
// Clipboard
function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast(T('cpd'),'s')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    toast(T('cpd'),'s');
  });
}
// Deep clone
function clone(o){ return JSON.parse(JSON.stringify(o)); }

// ─── APPLY LANGUAGE ───────────────────────────────────
function applyLang(lang='en'){
  S.lang=lang;
  const cfg=LANGS[lang]||LANGS.en;
  const root=$('#HR');
  if(root){ root.setAttribute('lang',lang); root.setAttribute('dir',cfg.d); }
  document.title=T('appName');
  // Update ad modal texts
  const adTtl=$('#adTtl'),adSub=$('#adSub'),adWrn=$('#adWarn'),adPLb=$('#adPLb');
  if(adTtl) adTtl.textContent=T('adTtl');

// ─── AD SYSTEM ────────────────────────────────────────
let adTimer_=null, adSec_=0;

function startAd(wallId, type='unlock', cb=null){
  if(S.adActive){ toast('Ad already running','w'); return; }
  const now=Date.now();
  if(now-S.adLastMs < CFG.adGapMs){
    toast('Wait a moment before next ad','w');
    return;
  }
  S.adActive=true; S.adWallId=wallId; S.adType=type; S.adCallback=cb;
  adSec_=CFG.adSec;
  // Open smartlink in new tab
  window.open(CFG.smartLink,'_blank','noopener');
  // Show ad modal
  const adm=$('#adm'); adm.style.display='flex';
  // Block back button during ad
  history.pushState(null,null,location.href);
  window.onpopstate=()=>{ history.pushState(null,null,location.href); };
  // Show corner counter
  const cc=$('#cc'); cc.style.display='flex'; cc.textContent=adSec_;
  // Update ring (circumference for r=55: 2*π*55 ≈ 345)
  const ring=$('#adRing'); ring.style.strokeDashoffset='345';
  $('#adNum').textContent=adSec_;
  $('#adPBar').style.width='0%';
  $('#adPCt').textContent=`0 / ${CFG.adSec}${T('sec')}`;
  // Prevent closing with beforeunload
  window.onbeforeunload=()=>'Ad in progress. Do not close!';
  // Tick
  adTimer_=setInterval(()=>{
    adSec_--;
    const elapsed=CFG.adSec-adSec_;
    const pct=(elapsed/CFG.adSec)*100;
    const offset=345-(345*(elapsed/CFG.adSec));
    $('#adNum').textContent=Math.max(0,adSec_);
    $('#cc').textContent=Math.max(0,adSec_);
    if(ring) ring.style.strokeDashoffset=offset.toString();
    $('#adPBar').style.width=pct+'%';
    $('#adPCt').textContent=`${elapsed} / ${CFG.adSec}${T('sec')}`;
    if(adSec_<=0){
      clearInterval(adTimer_);
      finishAd();
    }
  },1000);
}

function finishAd(){
  S.adActive=false;
  S.adLastMs=Date.now();
  window.onbeforeunload=null;
  window.onpopstate=null;
  const adm=$('#adm'); adm.style.display='none';
  const cc=$('#cc'); cc.style.display='none';
  const type=S.adType, wallId=S.adWallId, cb=S.adCallback;
  S.adType=null; S.adWallId=null; S.adCallback=null;
  if(type==='unlock' && wallId){
    onAdCompleteForWall(wallId);
  } else if(type==='notice' && cb){
    cb();
  } else if(type==='withdraw' && cb){
    cb();
  }
}

async function onAdCompleteForWall(wallId){
  if(!S.user) return;
  const uid=S.user.uid;
  const ref=fDB.ref(`users/${uid}/wallProgress/${wallId}`);
  const snap=await ref.once('value');
  let prog=snap.val()||{count:0,unlockedAt:0};
  // Check if already unlocked and within 24h
  if(prog.unlockedAt && (Date.now()-prog.unlockedAt)<CFG.unlock24h){
    toast(T('adNote'),'s');
    render();
    return;
  }
  prog.count=(prog.count||0)+1;
  // Also increment global adsWatched
  await fDB.ref(`users/${uid}/adsWatched`).transaction(v=>(v||0)+1);
  if(prog.count>=CFG.adsPerWall){
    prog.count=0;
    prog.unlockedAt=Date.now();
    await ref.set(prog);
    toast(T('wdone'),'s');
  } else {
    await ref.set(prog);

  render();

function getUserPayout(cpaAmount){
  // Admin যদি 'cpa' mode রাখে → CPA এর real amount দেবে
  if(S.payoutMode==='cpa') return parseFloat(cpaAmount)||0;
  // 'custom' mode → দেশ অনুযায়ী admin set করা amount
  const cc=S.country||'';
  if(S.payoutRates[cc]!=null) return S.payoutRates[cc];
  const hiCC=CFG.hiCC||[];
  if(hiCC.includes(cc)) return S.payoutRates.hi||0.50;
  return S.payoutRates.default||0.30;
}

async function fetchRSSOffers(wallId){
  S.rssLoading=true; S.rssOffers=[]; S.rssWallId=wallId;
  // Load CPAGrip credentials from Firebase (Admin can update)
  const snap=await fDB.ref('settings/cpa').once('value');
  const cpa=snap.val()||{};
  const userId=cpa.userId||CFG.cpaUserId||'';
  const key=cpa.key||CFG.cpaKey||'';
  const uid=S.user?.uid||'';
  if(!userId||!key||userId==='YOUR_CPAGRIP_USER_ID'){
    S.rssLoading=false;
    S.rssOffers=[{error:true,msg:'CPAGrip credentials not set. Go to Admin → Settings.'}];
    return;
  }
  const cc=S.country||'';
  const rssUrl=`https://www.cpagrip.com/common/offer_feed_rss.php?user_id=${userId}&key=${key}&country=${cc}&tracking_id=${uid}`;
  const proxyUrl=CFG.rssProxy+encodeURIComponent(rssUrl);
  try{
    const res=await fetch(proxyUrl,{signal:AbortSignal.timeout(8000)});
    const txt=await res.text();
    const parser=new DOMParser();
    const xml=parser.parseFromString(txt,'text/xml');
    const items=[...xml.querySelectorAll('item')];
    if(!items.length){
      S.rssOffers=[{empty:true}]; S.rssLoading=false; return;
    }
    S.rssOffers=items.slice(0,30).map(it=>({
      title:it.querySelector('title')?.textContent||'Offer',
      desc:it.querySelector('description')?.textContent||'',
      link:it.querySelector('link')?.textContent||'',
      payout:parseFloat(it.querySelector('payout')?.textContent||it.querySelector('price')?.textContent||'0'),
      category:it.querySelector('category')?.textContent||'',
      country:it.querySelector('country')?.textContent||cc,
      img:it.querySelector('image_url')?.textContent||'',
    }));
  }catch(e){
    S.rssOffers=[{error:true,msg:'Failed to load offers. Check your CPAGrip credentials.'}];
  }
  S.rssLoading=false;
}

// Postback listener — CPA network এ offer complete হলে এখানে আসে
async function processPostbacks(){
  if(!S.user) return;
  const uid=S.user.uid;
  try{
    const snap=await fDB.ref(`postbacks/${uid}`).once('value');
    const data=snap.val()||{};
    for(const [key,val] of Object.entries(data)){
      if(val && !val.processed && val.amount){
        const cpaAmt=parseFloat(val.amount)||0;
        const userAmt=getUserPayout(cpaAmt); // Admin set amount দেবে
        const wallId=val.wallId||'w1';
        const offerId=val.offer_id||key;
        // Check duplicate
        const dupSnap=await fDB.ref(`offers/${uid}/${encKey(offerId)}`).once('value');
        if(dupSnap.exists()){ await fDB.ref(`postbacks/${uid}/${key}/processed`).set(true); continue; }
        // Save offer
        await fDB.ref(`offers/${uid}/${encKey(offerId)}`).set({
          id:offerId, wallId, cpaAmount:cpaAmt,
          userAmount:userAmt, completedAt:Date.now(), verified:true,
        });
        // Add user earning
        await fDB.ref(`users/${uid}/usdEarned`).transaction(v=>(v||0)+userAmt);
        await fDB.ref(`users/${uid}/offersCompleted`).transaction(v=>(v||0)+1);
        // Today's earning
        const today=new Date().toDateString();
        const todaySnap=await fDB.ref(`users/${uid}/todayDate`).once('value');
        if(todaySnap.val()!==today){
          await fDB.ref(`users/${uid}/todayDate`).set(today);
          await fDB.ref(`users/${uid}/todayEarned`).set(userAmt);
        } else {
          await fDB.ref(`users/${uid}/todayEarned`).transaction(v=>(v||0)+userAmt);
        }
        await fDB.ref(`postbacks/${uid}/${key}/processed`).set(true);
        toast(`✅ Offer completed! +$${userAmt.toFixed(2)}`,'s');
      }
    }
  }catch(e){ console.log('Postback check error:',e); }
}

}

    const found=snap.val();

      adsWatched:0, offersCompleted:0, activeReferrals:0,
      isAdmin:false, banned:false, forgotUsed:false,
      deviceId:devId, emailVerified:false,
    };
    await fDB.ref(`users/${uid}`).set(userData);
    // Add referral
    if(refByUid){
      await fDB.ref(`users/${refByUid}/pendingReferrals/${uid}`).set(Date.now());
    }
    toast(T('rs'),'s');
    S.page='verify';
    render();

async function submitWithdraw(method,account,amount){
  const ud=S.userData;
  if(!ud){ toast('Not logged in','e'); return; }
  const usd=parseFloat(amount);
  if(isNaN(usd)||usd<CFG.minUSD){
    toast(T('wf'),'e');
    // Show ad as penalty then redirect
    startAd(null,'withdraw',()=>{ S.page='wallet'; render(); });
    return;
  }
  if((ud.activeReferrals||0)<CFG.minRefs){
    toast(T('noWarn'),'w');
    startAd(null,'withdraw',()=>{ S.page='wallet'; render(); });
    return;
  }
  if((ud.usdEarned||0)<usd){
    toast(T('wf'),'e'); return;
  }
  const wid=fDB.ref('withdrawals').push().key;
  await fDB.ref(`withdrawals/${wid}`).set({
    id:wid, uid:S.user.uid, userEmail:ud.email, userName:ud.name,
    method, account, amount:usd, status:'pending',
    createdAt:Date.now(),
  });
  // Deduct from user
  await fDB.ref(`users/${S.user.uid}/usdEarned`).transaction(v=>Math.max(0,(v||0)-usd));
  toast(T('ws2'),'s');
  S.page='wallet'; render();

// ─── REALTIME LISTENERS ───────────────────────────────
function setupListeners(uid){
  // Clean old
  S.unsubscribes.forEach(u=>u());
  S.unsubscribes=[];
  // User data
  const uRef=fDB.ref(`users/${uid}`);
  const unsubUser=uRef.on('value',snap=>{
    S.userData=snap.val();
    if(S.userData?.banned){ doLogout(); toast(T('banned'),'e'); return; }
    updateNavBar();
  });
  S.unsubscribes.push(()=>uRef.off('value',unsubUser));
  // Notices (new ones)
  const nRef=fDB.ref('notices');
  const unsubN=nRef.on('value',snap=>{
    const data=snap.val()||{};
    const readSnap=S.userData?.readNotices||{};
    const unread=Object.entries(data).filter(([id])=>!readSnap[id]).map(([id,v])=>({...v,id}));
    if(unread.length>0) activateNoticeDot(unread);
  });
  S.unsubscribes.push(()=>nRef.off('value',unsubN));
}

function activateNoticeDot(notices){
  const nd=$('.nav-nd'); if(nd) nd.style.display='block';
  S.noticeQueue=notices;
}

function updateNavBar(){
  const balEl=$('.nav-bal');
  if(balEl && S.userData) balEl.textContent=fmt$(S.userData.usdEarned||0);
  // Update active referrals count (users who have watched at least 1 ad)
  checkActiveReferrals();
}

async function checkActiveReferrals(){
  if(!S.userData) return;
  const refs=S.userData.pendingReferrals||{};
  let active=0;
  for(const uid of Object.keys(refs)){
    const snap=await fDB.ref(`users/${uid}/adsWatched`).once('value');
    if((snap.val()||0)>0) active++;
  }
  if(active!==(S.userData.activeReferrals||0)){
    await fDB.ref(`users/${S.user.uid}/activeReferrals`).set(active);
  }
}

function attachAuthEvents(){
  // Login
  const lgBtn=$('#lgBtn');
  if(lgBtn){
    lgBtn.onclick=()=>doLogin($('#lgEm').value.trim(),$('#lgPw').value);
    $('#lgEye').onclick=()=>{ const p=$('#lgPw'); p.type=p.type==='password'?'text':'password'; };
    $('#lgFP').onclick=()=>{ S.page='forgot'; render(); };
    $('#lgToReg').onclick=()=>{ S.page='register'; render(); };
    $('#lgLang').onclick=()=>EZ.openLM();
  }
  // Register
  const rgBtn=$('#rgBtn');
  if(rgBtn){
    rgBtn.onclick=async()=>{
      const nm=$('#rgNm').value.trim(),em=$('#rgEm').value.trim(),
            pw=$('#rgPw').value,cpw=$('#rgCpw').value,ref=$('#rgRef').value.trim();
      if(!nm||!em||!pw){ toast('Fill all fields','e'); return; }
      if(pw.length<6){ toast('Password min 6 chars','e'); return; }
      if(pw!==cpw){ toast('Passwords do not match','e'); return; }
      rgBtn.disabled=true; rgBtn.textContent='Creating…';
      await doRegister(nm,em,pw,ref);
      rgBtn.disabled=false; rgBtn.textContent=T('reg');
    };
    $('#rgEye').onclick=()=>{ const p=$('#rgPw'); p.type=p.type==='password'?'text':'password'; };
    $('#rgToLi').onclick=()=>{ S.page='login'; render(); };
  }
  // Verify
  const veChk=$('#veChk');
  if(veChk){
    veChk.onclick=async()=>{
      await fAuth.currentUser?.reload();
      if(fAuth.currentUser?.emailVerified){
        await fDB.ref(`users/${fAuth.currentUser.uid}/emailVerified`).set(true);
        toast(T('veok'),'s');
        S.page='home'; render();
      } else { toast('Not verified yet. Check your email.','w'); }
    };
    $('#veRe').onclick=()=>{ fAuth.currentUser?.sendEmailVerification(); toast('Email sent!','s'); };
    $('#veLo').onclick=()=>doLogout();
  }
  // Forgot
  const fpBtn=$('#fpBtn');
  if(fpBtn){
    fpBtn.onclick=async()=>{
      fpBtn.disabled=true; fpBtn.textContent='Sending…';
      await doForgotPw($('#fpEm').value.trim());
      fpBtn.disabled=false; fpBtn.textContent=T('rp');
    };
    $('#fpBack').onclick=()=>{ S.page='login'; render(); };
  }
}

function renderApp(){
  if(!S.userData){ $('#app').innerHTML='<div class="ldr"><div class="sp"></div></div>'; return; }
  let html='';
  html+=buildNav();
  html+=`<div class="scr fu" id="scr">`;

  // Pages
  if(S.page==='home') html+=buildHome();

  else if(S.page==='offers') html+=buildOffers();
  else if(S.page==='profile') html+=buildProfile();
  else if(S.page==='admin' && S.userData.isAdmin) html+=buildAdmin();

function attachAppEvents(){
  // Bottom nav
  $$('.bni[data-page]').forEach(b=>b.onclick=()=>navTo(b.dataset.page));
  // Sidebar toggle
  const mn=$('#navMenu'); if(mn) mn.onclick=openSidebar;
  // Avatar
  const av=$('#navAv'); if(av) av.onclick=()=>navTo('profile');
  // Brand
  const br=$('.nav-bnd'); if(br) br.onclick=()=>navTo('home');
  // Wall cards
  $$('[data-goto-wall]').forEach(el=>{
    el.onclick=()=>openWall(el.dataset.gotoWall);
  });
  // Back buttons
  $$('[data-page]').forEach(btn=>{
    if(!btn.classList.contains('bni')) btn.onclick=()=>navTo(btn.dataset.page);
  });
  // Home notice
  const hn=$('#homeNotice');
  if(hn) hn.querySelector('button').onclick=()=>{
    if(S.noticeQueue.length) viewNotice(S.noticeQueue[0]);
  };
  // Wall view — RSS load + Script inject
  if(S.page==='wallview'){
    const wallId=S.unlockWallId;
    const w=S.wallData[wallId]||{};
    // Script Tag injection
    if((w.embedMode||'iframe')==='script' && w.scriptCode){
      const zone=document.getElementById('scriptInjectZone');
      if(zone){
        const uid=S.user?.uid||'';
        const injected=w.scriptCode.replace(/\{uid\}/g, uid);
        const wrapper=document.createElement('div');
        wrapper.innerHTML=injected;
        // Execute scripts inside
        wrapper.querySelectorAll('script').forEach(oldScript=>{
          const newScript=document.createElement('script');
          if(oldScript.src) newScript.src=oldScript.src;
          else newScript.textContent=oldScript.textContent;
          document.body.appendChild(newScript);
        });
        zone.appendChild(wrapper);
      }
    }
    if(w.useRSS){
      fetchRSSOffers(wallId).then(()=>renderRSSOffers(wallId));
    }
    const rfBtn=document.getElementById('rssRefresh');
    if(rfBtn) rfBtn.onclick=async()=>{
      rfBtn.disabled=true; rfBtn.textContent='⏳ Loading…';
      await fetchRSSOffers(wallId);
      renderRSSOffers(wallId);
      rfBtn.disabled=false; rfBtn.textContent='🔄 Refresh';
    };
  }
  // Wallet
  if(S.page==='wallet'){
    let selMethod='bkash';
    $$('[data-mth]').forEach(b=>{ b.classList.toggle('sel',b.dataset.mth==='bkash'); b.onclick=()=>{
      selMethod=b.dataset.mth; $$('[data-mth]').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    };});
    const wdBtn=$('#wdBtn');
    if(wdBtn) wdBtn.onclick=async()=>{
      wdBtn.disabled=true; wdBtn.textContent=T('sging');
      await submitWithdraw(selMethod,$('#wdAcc').value.trim(),$('#wdAmt').value);
      wdBtn.disabled=false; wdBtn.textContent='💸 '+T('sw');
    };
    loadWithdrawHistory();
  }
  // Unlock page
  if(S.page==='unlock'){
    const watchBtn=$('#watchAdBtn');
    if(watchBtn) watchBtn.onclick=()=>{
      if(!S.adActive) startAd(S.unlockWallId,'unlock');
    };
    updateUnlockUI(S.unlockWallId);
  }
  // Profile
  if(S.page==='profile'){
    const sv=$('#prfSv'); if(sv) sv.onclick=async()=>{
      const nm=$('#prfNm').value.trim();
      if(nm) await fDB.ref(`users/${S.user.uid}/name`).set(nm);
      toast(T('sv'),'s');
    };
    const lo=$('#prfLo'); if(lo) lo.onclick=doLogout;
  }
  // Notices
  if(S.page==='notices') loadNotices();
  // Admin tabs
  if(S.page==='admin'){
    $$('[data-atab]').forEach(b=>b.onclick=()=>{ S.adminTab=b.dataset.atab; render(); });
    loadAdminContent();
  }
  // Admin tab content buttons re-loaded in loadAdminContent
}

async function openWall(wallId){

// ─── FIREBASE AUTH STATE ──────────────────────────────
fAuth.onAuthStateChanged(async user=>{
  if(user){
    S.user=user;
    // Check email verified
    if(!user.emailVerified){
      S.page='verify';
      $('#ldr').style.display='none';
      $('#app').style.display='block';
      render(); return;
    }
    // Load user data
    const ud=await loadUserData(user.uid);
    if(!ud){
      // New user — wait for data to be written
      await new Promise(r=>setTimeout(r,1500));
      const ud2=await loadUserData(user.uid);
      S.userData=ud2;
    } else { S.userData=ud; }
    if(S.userData?.banned){
      toast(T('banned'),'e');
      fAuth.signOut(); S.user=null; S.userData=null;
      S.page='login';
      $('#ldr').style.display='none'; $('#app').style.display='block';
      render(); return;
    }
    // Apply user's saved language
    if(S.userData?.lang && LANGS[S.userData.lang]) applyLang(S.userData.lang);
    // Detect country
    detectCountry();
    // Load walls
    await getWallData();
    // Load payout settings
    await loadPayoutSettings();
    // Process any pending postbacks
    processPostbacks();
    // Setup realtime listeners
    setupListeners(user.uid);
    // Go to home
    if(S.page==='login'||S.page==='register'||S.page==='verify') S.page='home';
    $('#ldr').style.display='none'; $('#app').style.display='block';
    render();
  } else {
    S.user=null; S.userData=null;
    S.page='login';
    $('#ldr').style.display='none'; $('#app').style.display='block';
    render();
  }
});

// ─── POSTBACK LISTENER (REST-based) ───────────────────
// When CPA network hits postback URL, write to Firebase:
// PUT https://earnzip-a8766-default-rtdb.firebaseio.com/postbacks/{uid}_{wallId}.json
// body: {"amount":0.30,"offerId":"xxx"}
// The app checks /postbacks on load and processes them.
(async()=>{
  if(!S.user) return;
  const snap=await fDB.ref(`postbacks/${S.user.uid}`).once('value');
  const data=snap.val()||{};
  for(const [key,val] of Object.entries(data)){
    if(!val.processed && val.amount){
      const wallId=val.wallId||key.split('_')[1]||'w1';
      await markOfferComplete(S.user.uid,wallId,val.amount);
      await fDB.ref(`postbacks/${S.user.uid}/${key}/processed`).set(true);
    }
  }
})().catch(()=>{});
